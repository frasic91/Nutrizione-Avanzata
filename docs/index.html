<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Settimanale</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}
.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
input,button{
  padding:8px;
  margin:4px;
}
button{
  background:#4CAF50;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{opacity:0.9}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{background:#f2f2f2}
.hidden{display:none}
canvas{margin-top:20px}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">
<h2>Tracker Settimanale</h2>

<button onclick="logout()">Logout</button>

<h3>Inserimento Giornaliero</h3>
<input type="date" id="data">
<input type="number" id="peso" placeholder="Peso">
<input type="number" id="fabbisogno" placeholder="Fabbisogno Giornaliero">
<input type="number" id="calorieEffettive" placeholder="Calorie Effettive">
<button onclick="salvaGiorno()">Salva</button>

<h3>Ultimi 7 Giorni</h3>
<table id="tabella">
<thead>
<tr>
<th>Data</th>
<th>Peso</th>
<th>Fabbisogno</th>
<th>Calorie Effettive</th>
<th>Deficit/Surplus</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Grafico Peso</h3>
<canvas id="graficoPeso"></canvas>

<h3>Grafico Calorie</h3>
<canvas id="graficoCalorie"></canvas>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

// FIREBASE CONFIG
const firebaseConfig={
  apiKey:"AIzaSyAgObxcbvQfmbDrTkD8c1qE-iyxIwwDDmM",
  authDomain:"libreria-24a25.firebaseapp.com",
  projectId:"libreria-24a25",
  storageBucket:"libreria-24a25.firebasestorage.app",
  messagingSenderId:"176468553745",
  appId:"1:176468553745:web:e22ee006840027fd2e41b0"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let userUID=null;
let pesoChart=null;
let calorieChart=null;

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    userUID=user.uid;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    caricaDati();
  }else{
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

// LOGIN
window.login=function(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).catch(e=>document.getElementById("loginMsg").innerText=e.message);
}

// SIGNUP
window.signup=function(){
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).catch(e=>document.getElementById("loginMsg").innerText=e.message);
}

// LOGOUT
window.logout=function(){
  auth.signOut();
}

// SALVA
window.salvaGiorno=function(){
  if(!userUID) return;

  const data=document.getElementById("data").value;
  const peso=parseFloat(document.getElementById("peso").value);
  const fabbisogno=parseFloat(document.getElementById("fabbisogno").value);
  const calorieEffettive=parseFloat(document.getElementById("calorieEffettive").value);

  const deficit=Math.round(calorieEffettive - fabbisogno);

  db.collection("utenti").doc(userUID)
  .collection("giorni").doc(data)
  .set({
    data,peso,fabbisogno,calorieEffettive,deficit
  }).then(()=>caricaDati());
}

// CARICA
function caricaDati(){
  db.collection("utenti").doc(userUID)
  .collection("giorni")
  .orderBy("data","desc")
  .limit(7)
  .get()
  .then(snapshot=>{
    const tbody=document.querySelector("#tabella tbody");
    tbody.innerHTML="";

    const labels=[];
    const pesi=[];
    const calorie=[];

    snapshot.forEach(doc=>{
      const d=doc.data();
      tbody.innerHTML+=`
        <tr>
          <td>${d.data}</td>
          <td>${d.peso}</td>
          <td>${d.fabbisogno}</td>
          <td>${d.calorieEffettive}</td>
          <td>${d.deficit}</td>
        </tr>
      `;
      labels.push(d.data);
      pesi.push(d.peso);
      calorie.push(d.calorieEffettive);
    });

    creaGrafici(labels.reverse(),pesi.reverse(),calorie.reverse());
  });
}

// GRAFICI
function creaGrafici(labels,pesi,calorie){

  if(pesoChart) pesoChart.destroy();
  if(calorieChart) calorieChart.destroy();

  pesoChart=new Chart(document.getElementById("graficoPeso"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Peso",
        data:pesi
      }]
    }
  });

  calorieChart=new Chart(document.getElementById("graficoCalorie"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Calorie Effettive",
        data:calorie
      }]
    }
  });
}

});
</script>

</body>
</html>
