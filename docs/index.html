<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,sans-serif;
}

body{
background:linear-gradient(135deg,#a8edea,#fed6e3);
padding:20px;
}

h2{
text-align:center;
margin-bottom:25px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

label{
font-size:0.8rem;
font-weight:600;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#00c853;
color:white;
}

.reset{
background:#ff5252;
color:white;
}

.download{
background:#2196F3;
color:white;
}

.toggle{
background:#ffa000;
color:white;
}

.table-wrapper{
overflow-x:auto;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#f1f3f6;
}

.stat-box{
margin-top:20px;
padding:10px;
background:#f5f5f5;
border-radius:10px;
text-align:center;
font-weight:600;
}

canvas{
margin-top:30px;
}
  
  .login-wrapper{
display:flex;
gap:40px;
justify-content:center;
align-items:flex-start;
flex-wrap:wrap;
margin-bottom:30px;
}

.login-card,
.register-card{
flex:1;
min-width:260px;
max-width:350px;
padding:30px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
gap:10px;
}

.login-card{
background:linear-gradient(135deg,#e3f2fd,#bbdefb);
}

.register-card{
background:linear-gradient(135deg,#fff3e0,#ffe0b2);
}

.login-card h3,
.register-card h3{
text-align:center;
margin-bottom:10px;
}

#loginMessage{
text-align:center;
margin-top:10px;
font-weight:600;
color:#d32f2f;
}

</style>
</head>

<body>

<div class="container">

<h2>Nutrition Tracker Pro</h2>

<div id="loginContainer" class="login-wrapper">

<div class="login-card">

<h3>🔐 Accedi</h3>

<label>Email</label>
<input type="email" id="emailLogin">

<label>Password</label>
<input type="password" id="passwordLogin">

<button class="primary" onclick="login()">Accedi</button>
 <button class="toggle" onclick="resetPassword()">🔑 Password dimenticata?</button>

</div>


<div class="register-card">

<h3>📝 Registrati</h3>

<label>Email</label>
<input type="email" id="emailRegister">

<label>Password</label>
<input type="password" id="passwordRegister">

<button class="reset" onclick="register()">Registrati</button>

</div>

</div>

<p id="loginMessage"></p>

</div>


<div id="appContent" style="display:none">

<div class="grid">
<div><label>Peso (kg)</label><input type="number" id="peso" step="0.1"></div>
<div><label>Altezza (cm)</label><input type="number" id="altezza"></div>
<div><label>Età</label><input type="number" id="eta"></div>
<div><label>Sesso</label>
  <select id="sesso">
    <option value="uomo">Uomo</option>
    <option value="donna">Donna</option>
  </select>
</div>
<div><label>Livello attività</label>
  <select id="attivita">
    <option value="1.2">Sedentario</option>
    <option value="1.375">Leggermente attivo</option>
    <option value="1.55" selected>Moderato</option>
    <option value="1.725">Molto attivo</option>
    <option value="1.9">Estremo</option>
  </select>
</div>
<div><label>BMR manuale (kcal)</label><input type="number" id="bmrManuale" placeholder="Opzionale"></div>
<div><label>NEAT manuale (kcal)</label><input type="number" id="neatManuale" placeholder="Opzionale"></div>
<div><label>Data</label><input type="date" id="giorno"></div>
<div><label>Peso del giorno (kg)</label><input type="number" id="pesoGiorno" step="0.1"></div>
<div><label>Km corsa</label><input type="number" id="km" step="0.1"></div>
<div><label>Watt medi bici</label><input type="number" id="wattBici"></div>
<div><label>Durata bici (minuti)</label><input type="number" id="durataBici"></div>
<div><label>Deficit / Surplus (kcal)</label><input type="number" id="valoreCalorie"></div>
<div><label>% Proteine</label><input type="number" id="proteine" value="20"></div>
<div><label>% Carbo</label><input type="number" id="carbo" value="60"></div>
<div><label>% Grassi</label><input type="number" id="grassi" value="20"></div>
</div>

<button class="primary" onclick="calcola()">Salva Giorno</button>
<button class="primary" onclick="aggiornaPesoGiorno()">Aggiorna Peso Giorno</button>
<button class="reset" onclick="resetSettimana()">Reset</button>
<button class="download" onclick="downloadExcel()">Scarica Excel</button>
<button class="reset" onclick="logout()">Logout</button>

<div class="stat-box" id="mediaPeso">Media peso settimanale: -</div>
 <div class="stat-box" id="tdeeBox">TDEE stimato: -</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Data</th>
<th>Fabbisogno Giornaliero</th>
<th>Calorie</th>
<th>Proteine</th>
<th>Carbo</th>
<th>Grassi</th>
<th>Peso</th>
<th>Calorie Effettive</th>
<th>Deficit/Surplus</th>
</tr>
</thead>
<tbody id="tabella"></tbody>
<tfoot>
<tr class="totale">
<td>-</td>
<td>-</td>
<td id="totCal"></td>
<td id="totPro"></td>
<td id="totCarb"></td>
<td id="totGrass"></td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>
</tfoot>
</table>
</div>

<canvas id="calorieChart"></canvas>
<canvas id="macroChart"></canvas>
<canvas id="pesoChart"></canvas>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAgObxcbvQfmbDrTkD8c1qE-iyxIwwDDmM",
authDomain: "libreria-24a25.firebaseapp.com",
projectId: "libreria-24a25",
storageBucket: "libreria-24a25.appspot.com",
messagingSenderId: "176468553745",
appId: "1:176468553745:web:e22ee006840027fd2e41b0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){

const email=document.getElementById("emailLogin").value
const password=document.getElementById("passwordLogin").value

signInWithEmailAndPassword(auth,email,password)
.then(()=>{

document.getElementById("loginContainer").style.display="none"
document.getElementById("appContent").style.display="block"

caricaFirebase()   // ← QUI

})
.catch(e=>{
document.getElementById("loginMessage").innerText=e.message
})

}

window.register = function(){

const email=document.getElementById("emailRegister").value
const password=document.getElementById("passwordRegister").value

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("loginMessage").innerText="Registrazione completata"
})
.catch(e=>{
document.getElementById("loginMessage").innerText=e.message
}) 
}

window.resetPassword = function(){

const email=document.getElementById("emailLogin").value

if(!email){
alert("Inserisci la tua email per recuperare la password")
return
}

sendPasswordResetEmail(auth,email)
.then(()=>{
document.getElementById("loginMessage").innerText="Email di recupero inviata!"
})
.catch(e=>{
document.getElementById("loginMessage").innerText=e.message
})

}
  
window.logout = function() {
    auth.signOut()
    .then(() => {
        document.getElementById("appContent").style.display = "none";
        document.getElementById("loginContainer").style.display = "block";
        document.getElementById("loginMessage").innerText = "Logout effettuato!";
    })
    .catch((e) => {
        document.getElementById("loginMessage").innerText = "Errore logout: " + e.message;
    });
}  
  
</script>
<script>
var dati = JSON.parse(localStorage.getItem("settimana")) || {};
var mostraStoricoCompleto = false;

function calcola(){
  var p=parseFloat(document.getElementById("peso").value);
  var a=parseFloat(document.getElementById("altezza").value);
  var e=parseFloat(document.getElementById("eta").value);
  var s=document.getElementById("sesso").value;
  var act=parseFloat(document.getElementById("attivita").value);
  if(!p||!a||!e){alert("Inserisci dati profilo");return;}
  
  var bmrMan=parseFloat(document.getElementById("bmrManuale").value);
  var BMR=!isNaN(bmrMan)?bmrMan:(s==="uomo")?(10*p+6.25*a-5*e+5):(10*p+6.25*a-5*e-161);
  
  var neatMan=parseFloat(document.getElementById("neatManuale").value);
  var NEAT=!isNaN(neatMan)?neatMan:(BMR*act-BMR);
  
  var TDEE=BMR+NEAT;
  
  document.getElementById("tdeeBox").innerText="TDEE stimato: "+TDEE.toFixed(0)+" kcal";
  
  var kmCorsa=parseFloat(document.getElementById("km").value)||0;
  var calorieCorsa=kmCorsa*p;
  
  var wattB=parseFloat(document.getElementById("wattBici").value)||0;
  var durMin=parseFloat(document.getElementById("durataBici").value)||0;
  var calorieBici=0;
  if(wattB>0 && durMin>0){var sec=durMin*60; calorieBici=(wattB*sec)/1000/1.11631;}
  
  var calorieTotali=TDEE+calorieCorsa+calorieBici;
  var adj=parseFloat(document.getElementById("valoreCalorie").value)||0;
  calorieTotali+=adj;
  if(calorieTotali<TDEE) calorieTotali=TDEE;
  
  var proPerc=parseFloat(document.getElementById("proteine").value)||20;
  var carbPerc=parseFloat(document.getElementById("carbo").value)||60;
  var grassPerc=parseFloat(document.getElementById("grassi").value)||20;
  if(Math.round(proPerc+carbPerc+grassPerc)!==100){alert("Macro devono sommare 100");return;}
  
  var proteineG=(calorieTotali*(proPerc/100))/4;
  var carboG=(calorieTotali*(carbPerc/100))/4;
  var grassiG=(calorieTotali*(grassPerc/100))/9;
  
  var dataG=document.getElementById("giorno").value;
  var pesoG=parseFloat(document.getElementById("pesoGiorno").value)||null;
  if(!dataG){alert("Seleziona data");return;}
  
dati[dataG]={
  TDEE,
  calorieSport: calorieCorsa + calorieBici, // aggiungi questa riga
  calorieTotali,
  proteine:proteineG,
  carbo:carboG,
  grassi:grassiG,
  peso:pesoG,
  calorieEff:dati[dataG]?.calorieEff || null
};

  localStorage.setItem("settimana",JSON.stringify(dati));
  
 salvaFirebase(dataG,dati[dataG]);
  aggiorna();
}


function aggiornaPesoGiorno(){
  var dataG = document.getElementById("giorno").value;
  var pesoG = parseFloat(document.getElementById("pesoGiorno").value);
  
  if(!dataG || isNaN(pesoG)){ 
    alert("Seleziona data e inserisci peso valido"); 
    return; 
  }
  
  if(dati[dataG]){
      // Aggiorna solo il peso
      dati[dataG].peso = pesoG;
      localStorage.setItem("settimana", JSON.stringify(dati));

      // Aggiorna solo la cella del peso nella tabella
      var tbody = document.getElementById("tabella");
      var rows = tbody.getElementsByTagName("tr");
      for(var i=0; i<rows.length; i++){
          if(rows[i].children[0].innerText === dataG){
              rows[i].children[6].innerText = pesoG.toFixed(1); // colonna Peso
              break;
          }
      }

      // Aggiorna la media peso nella stat-box
      var totPeso = 0, countPeso = 0;
      Object.values(dati).forEach(v => { if(v.peso != null) { totPeso += v.peso; countPeso++; } });
      document.getElementById("mediaPeso").innerText = countPeso > 0
          ? "Media peso settimanale: " + (totPeso/countPeso).toFixed(2) + " kg"
          : "Media peso settimanale: -";

      // Aggiorna grafico peso
      var idx = Array.from(rows).indexOf(rows[i]);
      if(idx >= 0) pesoChart.data.datasets[0].data[idx] = pesoG;
      pesoChart.update();

      alert("Peso aggiornato!");
  } else { 
      alert("Non ci sono dati per questo giorno. Prima salva il giorno con calorie e macro."); 
  }
}

function aggiornaCalorieEff(data, valore){
  var val = parseFloat(valore);
  if(!isNaN(val)){
      dati[data].calorieEff = val;
      localStorage.setItem("settimana", JSON.stringify(dati));
  }
}

function resetSettimana(){if(confirm("Cancellare tutto?")){dati={};localStorage.removeItem("settimana");aggiorna();}}

function toggleStorico(){
  mostraStoricoCompleto = !mostraStoricoCompleto;
  document.querySelector(".toggle").innerText = mostraStoricoCompleto?"Mostra ultimi 7 giorni":"Mostra storico completo";
  aggiorna();
}

function downloadExcel(){
  var table=`<table border="1"><tr><th>Data</th><th>Fabbisogno Giornaliero</th><th>Calorie</th><th>Proteine</th><th>Carbo</th><th>Grassi</th><th>Peso</th><th>Calorie Effettive</th><th>Deficit/Surplus</th></tr>`;
 Object.keys(dati).sort((a,b)=> new Date(a)-new Date(b)).forEach(d=>{
      var val=dati[d];
var deficitSurplus = (val.calorieEff !== null && val.calorieEff !== undefined)
    ? (((val.TDEE || 0) + (val.calorieSport || 0)) - val.calorieEff).toFixed(0)
    : "-";
table+=`<tr>
<td>${d}</td>
<td>${(val.TDEE + (val.calorieSport || 0)).toFixed(0)}</td>
<td>${val.calorieTotali.toFixed(0)}</td>
<td>${val.proteine.toFixed(1)}</td>
<td>${val.carbo.toFixed(1)}</td>
<td>${val.grassi.toFixed(1)}</td>
<td>${val.peso?val.peso.toFixed(1):"-"}</td>
<td>${val.calorieEff?val.calorieEff.toFixed(0):"-"}</td>
<td>${deficitSurplus}</td>
</tr>`;
  });
  table+=`</table>`;
  var blob=new Blob([`<html><body>${table}</body></html>`],{type:"application/vnd.ms-excel"});
  var link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="SettimanaNutrizione.xls";
  link.click();
}

  
async function caricaFirebase() {
  const user = auth.currentUser;
  if (!user) return;

  const querySnapshot = await getDocs(collection(db, "utenti", user.uid, "giorni"));
  dati = {}; // reset locale
  querySnapshot.forEach((doc) => {
    dati[doc.id] = doc.data();
  });

  localStorage.setItem("settimana", JSON.stringify(dati)); // sincronizza localStorage
  aggiorna();
}

async function salvaFirebase(data, valori){

const user = auth.currentUser;

if(!user){
alert("Utente non autenticato");
return;
}
}
  
  async function salvaFirebase(data, valori) {
  const user = auth.currentUser;

  if (!user) {
    alert("Utente non autenticato");
    return;
  }

  try {
    await setDoc(
      doc(db, "utenti", user.uid, "giorni", data),
      valori
    );
    console.log("Salvato su Firebase");
  } catch (e) {
    console.error("Errore salvataggio", e);
  }
}

// GRAFICI
var calorieChart = new Chart(document.getElementById("calorieChart"), {type:'bar',data:{labels:[],datasets:[{label:'Calorie',data:[],backgroundColor:'#ff5252'}]},options:{responsive:true,plugins:{legend:{display:false}}}});
var macroChart = new Chart(document.getElementById("macroChart"), {type:'bar',data:{labels:[],datasets:[{label:'Proteine (g)',data:[],backgroundColor:'#2196F3'},{label:'Carbo (g)',data:[],backgroundColor:'#4CAF50'},{label:'Grassi (g)',data:[],backgroundColor:'#FF9800'}]},options:{responsive:true,plugins:{tooltip:{mode:'index',intersect:false},legend:{position:'top'}},scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}});
var pesoChart = new Chart(document.getElementById("pesoChart"), {type:'bar',data:{labels:[],datasets:[{label:'Peso (kg)',data:[],backgroundColor:'#9C27B0'}]},options:{responsive:true,scales:{y:{beginAtZero:false}}}});

function aggiorna(){
  var tbody=document.getElementById("tabella"); tbody.innerHTML="";
  var totCal=0,totPro=0,totCarb=0,totGrass=0,pesoTot=0,pesoCount=0;
  var labels=[],calData=[],proData=[],carbData=[],grassData=[],pesoData=[];
  var dateKeys = Object.keys(dati).sort((a,b)=> new Date(a)-new Date(b));
  if(!mostraStoricoCompleto){ dateKeys = dateKeys.slice(-7); } // ultimi 7 giorni
  dateKeys.forEach(d=>{
    var val=dati[d];
var deficitSurplus = (val.calorieEff !== null && val.calorieEff !== undefined)
    ? (((val.TDEE || 0) + (val.calorieSport || 0)) - val.calorieEff).toFixed(0)
    : "-";
    tbody.innerHTML+=`<tr>
      <td>${d}</td>
   <td>${((val.TDEE || 0) + (val.calorieSport || 0)).toFixed(0)}</td>
   <td>${val.calorieTotali.toFixed(0)}</td>
      <td>${val.proteine.toFixed(1)}</td>
      <td>${val.carbo.toFixed(1)}</td>
      <td>${val.grassi.toFixed(1)}</td>
      <td>${val.peso?val.peso.toFixed(1):"-"}</td>
     <td><input type="number" value="${val.calorieEff ?? ''}"onchange="aggiornaCalorieEff('${d}',this.value)" style="width:80px;"></td>
      <td>${deficitSurplus}</td>
      </tr>`;
    totCal+=val.calorieTotali; totPro+=val.proteine; totCarb+=val.carbo; totGrass+=val.grassi;
 if(val.peso !== null && val.peso !== undefined){
pesoTot+=val.peso;
pesoCount++;
}
    labels.push(d); calData.push(val.calorieTotali); proData.push(val.proteine); carbData.push(val.carbo); grassData.push(val.grassi); pesoData.push(val.peso || null);
  });
  document.getElementById("totCal").innerText=totCal.toFixed(0);
  document.getElementById("totPro").innerText=totPro.toFixed(1);
  document.getElementById("totCarb").innerText=totCarb.toFixed(1);
  document.getElementById("totGrass").innerText=totGrass.toFixed(1);
  document.getElementById("mediaPeso").innerText=pesoCount>0?"Media peso settimanale: "+(pesoTot/pesoCount).toFixed(2)+" kg":"Media peso settimanale: -";
  
  calorieChart.data.labels=labels; calorieChart.data.datasets[0].data=calData; calorieChart.update();
  macroChart.data.labels=labels; macroChart.data.datasets[0].data=proData; macroChart.data.datasets[1].data=carbData; macroChart.data.datasets[2].data=grassData; macroChart.update();
  pesoChart.data.labels=labels; pesoChart.data.datasets[0].data=pesoData; pesoChart.update();
}

aggiorna();
</script>
</div>
</body>
</html>
